name: Deploy to Deno Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      
      - uses: denoland/deployctl@v1
        with:
          project: my-exit-node
          entrypoint: exit_node.ts
          token: ${{ secrets.DENO_DEPLOY_TOKEN }}
